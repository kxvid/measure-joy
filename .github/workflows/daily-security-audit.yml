name: Daily Security Audit

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  SITE_URL: https://www.measurejoy.org
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. npm audit ──────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.text }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run npm audit
        id: summary
        shell: bash
        run: |
          set +e
          # npm audit writes JSON to stdout; keep stderr out of the file
          npm audit --json > npm-audit.json 2>/dev/null

          # Validate JSON; if npm wrote garbage, fall back to an empty doc
          if ! jq empty npm-audit.json >/dev/null 2>&1; then
            echo '{"metadata":{"vulnerabilities":{"critical":0,"high":0,"moderate":0,"low":0}}}' > npm-audit.json
          fi

          CRITICAL=$(jq -r '.metadata.vulnerabilities.critical // 0' npm-audit.json)
          HIGH=$(jq -r     '.metadata.vulnerabilities.high     // 0' npm-audit.json)
          MODERATE=$(jq -r '.metadata.vulnerabilities.moderate // 0' npm-audit.json)
          LOW=$(jq -r      '.metadata.vulnerabilities.low      // 0' npm-audit.json)

          TEXT="critical: $CRITICAL · high: $HIGH · moderate: $MODERATE · low: $LOW"
          echo "text=$TEXT" >> "$GITHUB_OUTPUT"
          echo "$TEXT"
          exit 0

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-${{ github.run_id }}
          path: npm-audit.json
          retention-days: 30

  # ── 2. Snyk SCA (direct CLI, never fails the step) ────────────────────────
  snyk:
    name: Snyk SCA
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.run.outputs.text }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Snyk needs the dependency tree resolved — install without running
      # postinstall scripts and with --legacy-peer-deps (React 19.2 vs Clerk)
      - name: Install project dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk test
        id: run
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e

          if [ -z "$SNYK_TOKEN" ]; then
            TEXT="⚠️ SNYK_TOKEN not set — skipped"
            echo '{"status":"skipped"}' > snyk-results.json
            echo "text=$TEXT" >> "$GITHUB_OUTPUT"
            echo "$TEXT"
            exit 0
          fi

          # snyk test exits 1 when vulns are found — that's data, not failure
          snyk test \
            --severity-threshold=high \
            --json-file-output=snyk-results.json \
            > snyk-output.txt 2>&1
          EXIT=$?

          case $EXIT in
            0) TEXT="✅ No high/critical vulnerabilities"                        ;;
            1) # Vulns found — parse the JSON for a count
               COUNT=$(jq -r '.vulnerabilities | length // 0' snyk-results.json 2>/dev/null || echo "?")
               TEXT="⚠️ $COUNT high/critical vulnerabilities found"             ;;
            2) TEXT="❌ Snyk CLI error — check artifact for details"             ;;
            3) TEXT="⚠️ No supported project detected by Snyk"                   ;;
            *) TEXT="❓ Snyk exited with code $EXIT"                              ;;
          esac

          echo "text=$TEXT" >> "$GITHUB_OUTPUT"
          echo "$TEXT"
          exit 0

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: snyk-results-${{ github.run_id }}
          path: |
            snyk-results.json
            snyk-output.txt
          retention-days: 30

  # ── 3. OWASP ZAP passive baseline scan ────────────────────────────────────
  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.SITE_URL }}
          cmd_options: '-a -j'
          issue_title: 'ZAP Baseline Scan — ${{ github.run_id }}'
          fail_action: false

  # ── 4. Security headers (direct curl) ─────────────────────────────────────
  security-headers:
    name: Security Headers
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.check.outputs.summary }}
    steps:
      - name: Check HTTP security headers
        id: check
        shell: bash
        run: |
          set +e

          SITE="https://www.measurejoy.org"
          HEADERS=$(curl -sI --max-time 15 "$SITE" 2>/dev/null)

          if [ -z "$HEADERS" ]; then
            SUMMARY="❌ Could not fetch headers from $SITE"
            echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "$SUMMARY"
            echo "curl failed or site unreachable" > security-headers.txt
            exit 0
          fi

          MISSING=""
          for entry in \
            "Strict-Transport-Security:strict-transport-security" \
            "X-Content-Type-Options:x-content-type-options" \
            "X-Frame-Options:x-frame-options" \
            "Content-Security-Policy:content-security-policy" \
            "Referrer-Policy:referrer-policy" \
            "Permissions-Policy:permissions-policy"; do
            LABEL="${entry%%:*}"
            PATTERN="${entry##*:}"
            if echo "$HEADERS" | grep -qi "^$PATTERN:"; then
              echo "✅ $LABEL"
            else
              echo "❌ $LABEL MISSING"
              MISSING="$MISSING $LABEL;"
            fi
          done

          if [ -n "$MISSING" ]; then
            SUMMARY="⚠️ Missing headers:$MISSING"
          else
            SUMMARY="✅ All 6 security headers present"
          fi

          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY"
          echo "$HEADERS" > security-headers.txt
          exit 0

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-headers-${{ github.run_id }}
          path: security-headers.txt
          retention-days: 30

  # ── 5. Lighthouse CI ──────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        shell: bash
        run: |
          set +e
          lhci autorun 2>&1 | tee lhci-output.txt
          exit 0

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-${{ github.run_id }}
          path: lhci-output.txt
          retention-days: 30

  # ── 6. Consolidated audit issue ───────────────────────────────────────────
  open-issue:
    name: Open Audit Issue
    runs-on: ubuntu-latest
    needs: [npm-audit, snyk, security-headers, lighthouse]
    if: always()
    permissions:
      issues: write
    steps:
      - name: Close yesterday's audit issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'security-audit',
              state: 'open',
              per_page: 20,
            });
            for (const issue of open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Create consolidated audit issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const date   = new Date().toISOString().split('T')[0];
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              `# 🔐 Daily Security Audit — ${date}`,
              ``,
              `> Full artifacts and logs: [Run #${{ github.run_id }}](${runUrl})`,
              ``,
              `## npm audit`,
              `\`${{ needs.npm-audit.outputs.summary }}\``,
              ``,
              `## Snyk SCA`,
              `${{ needs.snyk.outputs.summary }}`,
              `Full JSON report: \`snyk-results-${{ github.run_id }}\` artifact.`,
              ``,
              `## Security Headers`,
              `${{ needs.security-headers.outputs.summary }}`,
              `Full headers dump: \`security-headers-${{ github.run_id }}\` artifact.`,
              ``,
              `## OWASP ZAP Baseline`,
              `Passive scan findings are in the separate issue labeled \`ZAP-Results\` (opened by the ZAP job above).`,
              ``,
              `## Lighthouse CI`,
              `Scores uploaded to temporary public storage — see \`lighthouse-${{ github.run_id }}\` artifact for the URL.`,
              ``,
              `---`,
              `*Auto-generated daily. Review findings and close when addressed.*`,
            ].join('\n');

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🔐 Daily Security Audit — ${date}`,
              body,
              labels: ['security-audit', 'automated'],
            });
