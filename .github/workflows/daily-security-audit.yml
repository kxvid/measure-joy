name: Daily Security Audit

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC every day
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: read
  issues: write

env:
  SITE_URL: https://www.measurejoy.org
  # Opt into Node.js 24 now to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Dependency vulnerability scan ──────────────────────────────────────
  # npm audit reads package-lock.json directly — no npm ci needed
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.text }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run npm audit
        id: summary
        continue-on-error: true
        run: |
          npm audit --json > npm-audit.json 2>&1 || true
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
          HIGH=$(jq     '.metadata.vulnerabilities.high     // 0' npm-audit.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' npm-audit.json)
          LOW=$(jq      '.metadata.vulnerabilities.low      // 0' npm-audit.json)
          TEXT="critical: $CRITICAL · high: $HIGH · moderate: $MODERATE · low: $LOW"
          echo "text=$TEXT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-${{ github.run_id }}
          path: npm-audit.json
          retention-days: 30

  # ── 2. Snyk software composition analysis ─────────────────────────────────
  # snyk/actions/node handles its own npm install internally
  snyk:
    name: Snyk SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Snyk test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results-${{ github.run_id }}
          path: snyk-results.json
          retention-days: 30

  # ── 3. OWASP ZAP passive baseline scan ────────────────────────────────────
  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.SITE_URL }}
          cmd_options: '-a -j'
          issue_title: 'ZAP Baseline Scan — ${{ github.run_id }}'
          fail_action: false

  # ── 4. Security headers — direct curl check (no external API dependency) ──
  security-headers:
    name: Security Headers
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.check.outputs.summary }}
    steps:
      - name: Check HTTP security headers
        id: check
        run: |
          SITE="https://www.measurejoy.org"
          HEADERS=$(curl -sI --max-time 15 "$SITE")

          check() {
            local label="$1"
            local pattern="$2"
            if echo "$HEADERS" | grep -qi "$pattern"; then
              echo "✅ $label"
            else
              echo "❌ $label MISSING"
              MISSING="$MISSING $label;"
            fi
          }

          MISSING=""
          check "Strict-Transport-Security"  "strict-transport-security"
          check "X-Content-Type-Options"     "x-content-type-options"
          check "X-Frame-Options"            "x-frame-options"
          check "Content-Security-Policy"    "content-security-policy"
          check "Referrer-Policy"            "referrer-policy"
          check "Permissions-Policy"         "permissions-policy"

          if [ -n "$MISSING" ]; then
            SUMMARY="⚠️ Missing headers:$MISSING"
          else
            SUMMARY="✅ All 6 security headers present"
          fi

          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY"
          # Also dump full response headers as artifact
          echo "$HEADERS" > security-headers.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-headers-${{ github.run_id }}
          path: security-headers.txt
          retention-days: 30

  # ── 5. Lighthouse CI ───────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun 2>&1 | tee lhci-output.txt || true
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-${{ github.run_id }}
          path: lhci-output.txt
          retention-days: 30

  # ── 6. Consolidated audit issue ───────────────────────────────────────────
  open-issue:
    name: Open Audit Issue
    runs-on: ubuntu-latest
    needs: [npm-audit, security-headers, lighthouse]
    if: always()
    permissions:
      issues: write
    steps:
      - name: Close yesterday's audit issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'security-audit',
              state: 'open',
              per_page: 20,
            });
            for (const issue of open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Create consolidated audit issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const date   = new Date().toISOString().split('T')[0];
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              `# 🔐 Daily Security Audit — ${date}`,
              ``,
              `> Full artifacts and logs: [Run #${{ github.run_id }}](${runUrl})`,
              ``,
              `## npm audit`,
              `\`${{ needs.npm-audit.outputs.summary }}\``,
              ``,
              `## Security Headers`,
              `${{ needs.security-headers.outputs.summary }}`,
              `Full headers dump: \`security-headers-${{ github.run_id }}\` artifact`,
              ``,
              `## Snyk SCA`,
              `Full JSON report: \`snyk-results-${{ github.run_id }}\` artifact.`,
              ``,
              `## OWASP ZAP Baseline`,
              `Passive scan findings are in the separate issue labeled \`ZAP-Results\` (opened by the ZAP job above).`,
              ``,
              `## Lighthouse CI`,
              `Scores uploaded to temporary public storage — see \`lhci-output.txt\` artifact for the URL.`,
              ``,
              `---`,
              `*Auto-generated daily. Review findings and close when addressed.*`,
            ].join('\n');

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🔐 Daily Security Audit — ${date}`,
              body,
              labels: ['security-audit', 'automated'],
            });
